<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Offline-capable note taking app with Markdown support, full-text search, and PWA features" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Notes" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <title>Notes - Offline Note Taking</title>
    <style>
      /* Critical CSS for splash screen */
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }
      .splash {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        background: #fafafa;
        color: #333;
      }
      .splash.dark {
        background: #1a1a2e;
        color: #e0e0e0;
      }
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #6366f1;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this offline notes app.</noscript>
    <div id="root">
      <div class="splash" id="splash">
        <h1>Notes</h1>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script>
      // Check theme preference early to style splash screen
      (function() {
        const saved = localStorage.getItem('notes-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.getElementById('splash').classList.add('dark');
        }
      })();
    </script>
  </body>
</html>
